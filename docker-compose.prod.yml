services:
  postgres:
    image: postgres:16-alpine
    container_name: rn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rightnow_fitness
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rn-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rightnow_fitness?schema=public
      JWT_SECRET: rightnow-prod-secret-change-me
      PORT: 5000
      HOST: 0.0.0.0
      CORS_ORIGIN: http://103.236.92.40:25650
      RAG_SERVICE_URL: http://rag:8000
      ADMIN_SEED_EMAIL: admin@admin.com
      ADMIN_SEED_PASSWORD: "123456"
      ADMIN_SEED_NAME: RightNow Admin
      IMAGE_GEN_BASE_URL: https://code.newcli.com/codex/v1
      IMAGE_GEN_MODEL: gpt-image-2
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  rag:
    build:
      context: .
      dockerfile: Dockerfile.rag
    container_name: rn-rag
    restart: unless-stopped
    environment:
      RAG_CORS_ORIGINS: "*"
      RAG_CHROMA_PERSIST_DIR: /app/chroma_db
      RAG_BLOGGER_CHROMA_DIR: /app/chroma_blogger
      RAG_CLEANED_DATA_PATH: /data/cleaned-data
      RAG_BLOGGER_DATA_PATH: /data/blogger-data
      RAG_EMBEDDING_MODEL: BAAI/bge-small-zh-v1.5
      RAG_USE_BLOGGER: "true"
      RAG_USE_WEB_SEARCH: "true"
      RAG_WEB_SEARCH_ENGINE: duckduckgo
      RAG_SIMILARITY_THRESHOLD: "0.35"
      HF_ENDPOINT: https://hf-mirror.com
    volumes:
      - chroma_data:/app/chroma_db
      - chroma_blogger_data:/app/chroma_blogger
      - ./cleaned-data:/data/cleaned-data:ro
      - ./blogger-data:/data/blogger-data:ro

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_STEPFUN_API_KEY: ${VITE_STEPFUN_API_KEY:-}
    container_name: rn-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  chroma_data:
  chroma_blogger_data:
