services:
  postgres:
    image: postgres:16-alpine
    container_name: rn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rightnow_fitness
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rn-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rightnow_fitness?schema=public
      JWT_SECRET: rightnow-prod-secret-change-me
      PORT: 5000
      HOST: 0.0.0.0
      CORS_ORIGIN: http://103.236.92.40:25650
      RAG_SERVICE_URL: http://rag:8000
      ADMIN_SEED_EMAIL: admin@admin.com
      ADMIN_SEED_PASSWORD: "123456"
      ADMIN_SEED_NAME: RightNow Admin
      IMAGE_GEN_BASE_URL: https://code.newcli.com/codex/v1
      IMAGE_GEN_MODEL: gpt-image-2
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  rag:
    build:
      context: .
      dockerfile: Dockerfile.rag
    container_name: rn-rag
    restart: unless-stopped
    environment:
      RAG_CORS_ORIGINS: "*"
      RAG_CHROMA_PERSIST_DIR: /app/chroma_db
      RAG_PDF_BASE_PATH: /app/knowledge_base
      HF_ENDPOINT: https://hf-mirror.com
    volumes:
      - chroma_data:/app/chroma_db
      - ./rag-service/knowledge_base:/app/knowledge_base

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rn-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  chroma_data:
