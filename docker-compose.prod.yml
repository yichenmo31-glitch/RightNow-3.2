services:
  postgres:
    image: postgres:16-alpine
    container_name: rn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rightnow_fitness}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your private .env file}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rn-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in your private .env file}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your private .env file}
      PORT: 5000
      HOST: 0.0.0.0
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:5174}
      RAG_SERVICE_URL: http://rag:8000
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:-admin@example.com}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:?Set ADMIN_SEED_PASSWORD in your private .env file}
      ADMIN_SEED_NAME: ${ADMIN_SEED_NAME:-RightNow Admin}
      IMAGE_GEN_BASE_URL: ${IMAGE_GEN_BASE_URL:-}
      IMAGE_GEN_MODEL: ${IMAGE_GEN_MODEL:-gpt-image-2}
      IMAGE_GEN_API_KEY: ${IMAGE_GEN_API_KEY:-}
      IMAGE_GEN_PROXY_URL: ${IMAGE_GEN_PROXY_URL:-}
      STEPFUN_BASE_URL: ${STEPFUN_BASE_URL:-https://api.stepfun.com/v1}
      STEPFUN_API_KEY: ${STEPFUN_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  rag:
    build:
      context: .
      dockerfile: Dockerfile.rag
    container_name: rn-rag
    restart: unless-stopped
    environment:
      RAG_CORS_ORIGINS: "*"
      RAG_CHROMA_PERSIST_DIR: /app/chroma_db
      RAG_BLOGGER_CHROMA_DIR: /app/chroma_blogger
      RAG_CLEANED_DATA_PATH: /data/cleaned-data
      RAG_BLOGGER_DATA_PATH: /data/blogger-data
      RAG_EMBEDDING_MODEL: BAAI/bge-small-zh-v1.5
      RAG_USE_BLOGGER: "true"
      RAG_USE_WEB_SEARCH: "true"
      RAG_WEB_SEARCH_ENGINE: duckduckgo
      RAG_SIMILARITY_THRESHOLD: "0.35"
      HF_ENDPOINT: https://hf-mirror.com
    volumes:
      - chroma_data:/app/chroma_db
      - chroma_blogger_data:/app/chroma_blogger
      - ./cleaned-data:/data/cleaned-data:ro
      - ./blogger-data:/data/blogger-data:ro

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rn-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./letsencrypt:/etc/letsencrypt:ro
      - ./certbot-www:/var/www/certbot
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  chroma_data:
  chroma_blogger_data:
