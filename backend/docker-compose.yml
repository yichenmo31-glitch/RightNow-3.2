services:
  postgres:
    image: postgres:16-alpine
    container_name: rightnow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rightnow
      POSTGRES_PASSWORD: rightnow123
      POSTGRES_DB: rightnow
    ports:
      - '15432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rightnow-api
    restart: unless-stopped
    ports:
      - '3100:3100'
    environment:
      DATABASE_URL: postgresql://rightnow:rightnow123@postgres:5432/rightnow?schema=public
      JWT_SECRET: rightnow-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your-gemini-api-key-here}
      PORT: 3100
      UPLOAD_DIR: ./uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      - postgres

volumes:
  pgdata:
  uploads:
