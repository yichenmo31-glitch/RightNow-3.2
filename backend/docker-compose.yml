services:
  postgres:
    image: postgres:16-alpine
    container_name: rightnow-fitness-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rightnow_fitness
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15433:5432"
    volumes:
      - rightnow_fitness_pgdata:/var/lib/postgresql/data

volumes:
  rightnow_fitness_pgdata:
