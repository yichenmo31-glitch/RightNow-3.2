# Include this file inside the existing public server block. Do not replace the
# existing `location /` because it serves Personal OpenClaw.

location = /rightnow {
    return 308 /rightnow/;
}

location /rightnow/ {
    root /var/www;
    try_files $uri $uri/ /rightnow/index.html;
}

location /rightnow/assets/ {
    root /var/www;
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
}

location /rightnow-api/ {
    proxy_pass http://127.0.0.1:5000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 120s;
}

location /rightnow-uploads/ {
    proxy_pass http://127.0.0.1:5000/uploads/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

